name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel build
          python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall src

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Tests
        run: pytest

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Wheel content smoke
        shell: python
        run: |
          from pathlib import Path
          import zipfile

          wheel = next(Path("dist").glob("arabic_legal_research_skill-*.whl"))
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
          required = {
              "legal_research_skill/schemas/research-state.schema.json",
              "legal_research_skill/schemas/validation-report.schema.json",
              "legal_research_skill/schemas/artifact-manifest.schema.json",
          }
          missing = required - names
          if missing:
              raise SystemExit(f"Missing packaged schemas: {sorted(missing)}")

      - name: Structural artifact smoke
        run: >
          python -m legal_research_skill build-artifact
          examples/fixtures/valid/approved-plan-locked.json
          --output-dir tests_tmp/ci-artifact
          --format json
