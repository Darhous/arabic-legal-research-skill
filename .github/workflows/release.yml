name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel build
          python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall src

      - name: Tests
        run: pytest

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Wheel content smoke
        shell: python
        run: |
          from pathlib import Path
          import zipfile

          wheel = next(Path("dist").glob("arabic_legal_research_skill-*.whl"))
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
          required = {
              "legal_research_skill/schemas/research-state.schema.json",
              "legal_research_skill/schemas/validation-report.schema.json",
              "legal_research_skill/schemas/artifact-manifest.schema.json",
          }
          missing = required - names
          if missing:
              raise SystemExit(f"Missing packaged schemas: {sorted(missing)}")

      - name: Compute wheel SHA-256
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          $hash = Get-FileHash -Algorithm SHA256 $wheel.FullName
          "$($hash.Hash.ToLower())  $($wheel.Name)" | Out-File -Encoding utf8 dist/SHA256SUMS.txt
          Get-Content dist/SHA256SUMS.txt

      - name: Installed-wheel smoke (isolated venv, outside repo, no PYTHONPATH)
        shell: pwsh
        run: |
          $venvDir = Join-Path $env:RUNNER_TEMP "release-smoke-venv"
          python -m venv $venvDir
          $py = Join-Path $venvDir "Scripts\python.exe"
          $wheel = (Get-ChildItem dist/*.whl | Select-Object -First 1).FullName
          & $py -m pip install --upgrade pip
          & $py -m pip install $wheel
          Push-Location $env:RUNNER_TEMP
          & $py -m legal_research_skill --help
          & $py -c "import importlib.metadata as m; print('version:', m.version('arabic-legal-research-skill'))"
          & $py -c "from legal_research_skill.constants import RESEARCH_STATE_SCHEMA; assert RESEARCH_STATE_SCHEMA.is_file(); print('schema resource ok')"
          Pop-Location

      # This workflow intentionally stops at "build, verify, and upload as a
      # CI artifact." It does not create a GitHub Release, does not publish
      # to PyPI, and does not use any repository secrets -- publishing a
      # release from this verified artifact remains a separate, deliberate,
      # human-triggered step.
      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-wheel-${{ github.ref_name }}
          path: |
            dist/*.whl
            dist/SHA256SUMS.txt
          if-no-files-found: error
